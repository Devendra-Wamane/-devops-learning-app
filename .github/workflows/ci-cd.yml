name: CI/CD Pipeline

# Triggers: runs on every push and pull request to main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: devops-task-app
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  EC2_HOST: ${{ secrets.EC2_HOST }}
  EC2_USER: ${{ secrets.EC2_USER }}

jobs:
  # ── Job 1: Lint & Test ──────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest

      - name: Run tests
        working-directory: app
        run: python -m pytest tests/ -v
        env:
          ENVIRONMENT: test

  # ── Job 2: Build Docker Image ───────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test          # only builds if tests pass
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image version tag
        run: |
          echo "VERSION=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV
          echo "ECR_IMAGE=${{ steps.login-ecr.outputs.registry }}/$IMAGE_NAME" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -t $ECR_IMAGE:$VERSION -t $ECR_IMAGE:latest .

      - name: Push Docker image to ECR
        run: |
          docker push $ECR_IMAGE:$VERSION
          docker push $ECR_IMAGE:latest

      - name: Smoke test the container
        run: |
          docker run -d --name smoke-test -p 5000:5000 $ECR_IMAGE:latest
          sleep 5
          curl --fail http://localhost:5000/health
          docker stop smoke-test

  # ── Job 3: Deploy (only on push to main) ───────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version
        run: echo "VERSION=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: Copy deployment files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,docker-compose.prod.yml,nginx/nginx.conf"
          target: "/home/${{ secrets.EC2_USER }}/devops-learning-app"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_NAME,VERSION,AWS_REGION,ECR_REGISTRY
          script: |
            set -e
            cd /home/${{ secrets.EC2_USER }}/devops-learning-app
            aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"
            export APP_VERSION="$VERSION"
            export ECR_REGISTRY="$ECR_REGISTRY"
            export IMAGE_NAME="$IMAGE_NAME"
            export IMAGE_TAG="$VERSION"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans --no-build
            curl --fail http://localhost/health
