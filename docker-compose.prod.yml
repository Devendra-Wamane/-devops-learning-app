version: "3.9"

# ── Production override ───────────────────────────────────────────────────────
# Run: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# This file OVERRIDES values in docker-compose.yml for production

services:
  app:
    image: ${ECR_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG:-latest}
    environment:
      - ENVIRONMENT=production
      - APP_VERSION=${APP_VERSION:-1.0.0}   # injected by CI/CD pipeline
    ports: []                                # no direct port — traffic goes via nginx only

  nginx:
    ports:
      - "80:80"
      - "443:443"
