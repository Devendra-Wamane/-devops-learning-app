# Nginx reverse proxy config
# Traffic flow: Browser → Nginx:80 → app:5000

upstream flask_app {
    server app:5000;          # "app" is the docker-compose service name
}

server {
    listen 80;
    server_name localhost;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Proxy all traffic to Flask
    location / {
        proxy_pass         http://flask_app;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Health check endpoint — used by load balancers
    location /health {
        proxy_pass http://flask_app/health;
        access_log off;      # don't pollute logs with health poll noise
    }
}
